<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Th√™m v√≠</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            
            body { font-family: sans-serif; padding: 20px; background: #f3f4f6; }
            .form-container { background: white; padding: 30px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
            .form-group { margin-bottom: 15px; }
            .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
            input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
            .btn-submit { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
            .btn-submit:hover { background: #059669; }
        </style>
    </head>
    <body>
        <div class="form-container">
            <h2>Th√™m v√≠</h2>
            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>T√™n v√≠</label>
                    {{ form.name }}
                </div>
                
                <div class="form-group">
                    <label>SбїС d∆∞ ban ƒСбЇІu</label>
                    {{ form.balance }}
                </div>

                <div class="form-group">
                    <label>Icon</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <div id="iconPreview" style="font-size: 32px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border: 2px solid #ccc; border-radius: 8px;">
                            рЯТ≥
                        </div>
                        <button type="button" onclick="openIconPicker()" style="flex: 1; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">
                            ChбїНn Icon
                        </button>
                    </div>
                    
                    <div style="display: none;">
                        {{ form.icon }}
                    </div>
                </div>

                <button type="submit" class="btn-submit">Th√™m v√≠</button>
            </form>
        </div>

        <div id="iconPickerOverlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
            <div style="background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3>ChбїНn Icon</h3>
                    <button type="button" onclick="closeIconPicker()" style="background:none; border:none; cursor:pointer; font-size:20px;">вЬХ</button>
                </div>
                <input type="text" id="iconSearch" placeholder="T√ђm kiбЇњm icon..." style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;">
                <div id="iconGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px;">
                    </div>
            </div>
        </div>

        <script>
            const iconList = [
                'рЯТ∞', 'рЯТ≥', 'рЯТµ', 'рЯТі', 'рЯТґ', 'рЯТЈ', 'рЯТЄ', 'рЯП¶', 'рЯПІ', 'рЯТє',
                'рЯЫТ', 'рЯЫНпЄП', 'рЯУ¶', 'рЯЪЧ', 'рЯЪХ', 'рЯЪЩ', 'вЬИпЄП', 'рЯП®', 'рЯНФ', 'рЯНХ',
                'рЯНЬ', 'вШХ', 'рЯНО', 'рЯНК', 'рЯНМ', 'рЯСХ', 'рЯСЧ', 'рЯСФ', 'рЯС†', 'рЯСЮ',
                'рЯУ±', 'рЯТї', 'вМЪ', 'рЯУЈ', 'рЯУє', 'рЯОЃ', 'рЯО®', 'вЬПпЄП', 'рЯУЪ', 'рЯУЦ',
                'рЯП•', 'вЪХпЄП', 'рЯТК', 'рЯПЛпЄП', 'рЯ§Є', 'рЯЪі', 'вЪљ', 'рЯПА', 'рЯОЊ', 'рЯПР',
                'рЯО≠', 'рЯО™', 'рЯО®', 'рЯОђ', 'рЯО§', 'рЯОІ', 'рЯОЉ', 'рЯОє', 'рЯОЄ', 'рЯ•Б',
                'рЯМН', 'рЯМО', 'рЯМП', 'рЯЧЇпЄП', 'рЯПФпЄП', 'вЫ∞пЄП', 'рЯПЬпЄП', 'рЯПЦпЄП', 'рЯПЭпЄП', 'рЯМК',
                'в≠Р', 'рЯМЯ', 'вЬ®', 'вЪ°', 'рЯФ•', 'рЯМИ', 'рЯМ§пЄП', 'вЫЕ', 'рЯМ¶пЄП', 'рЯМІпЄП',
                'вЭ§пЄП', 'рЯІ°', 'рЯТЫ', 'рЯТЪ', 'рЯТЩ', 'рЯТЬ', 'рЯЦ§', 'рЯ§Н', 'рЯ§О', 'рЯТФ',
                'рЯС®', 'рЯС©', 'рЯС¶', 'рЯСІ', 'рЯС®вАНрЯС©вАНрЯСІвАНрЯС¶', 'рЯС™', 'рЯРґ', 'рЯР±', 'рЯР≠', 'рЯРє',
                'рЯУИ', 'рЯУЙ', 'рЯТЉ', 'рЯУК', 'рЯУЛ', 'рЯУД', 'рЯУГ', 'рЯУС', 'рЯОѓ', 'рЯОБ',
                'вЬЕ', 'вЭМ', 'вЪ†пЄП', 'рЯФФ', 'рЯФХ', 'рЯУҐ', 'рЯУ£', 'рЯУѓ', 'рЯУЮ', 'рЯУІ'
            ];

            // Khi vбїЂa v√†o trang web, tбї± ƒСбїЩng lбЇ•y icon c≈© tбїЂ database hiбїГn thбїЛ l√™n Preview
            document.addEventListener('DOMContentLoaded', function() {
                // Django mбЇЈc ƒСбїЛnh ƒСбЇЈt ID cho c√°c tr∆∞бїЭng form l√† id_t√™n_tr∆∞бїЭng
                const iconInput = document.getElementById('id_icon'); 
                if (iconInput && iconInput.value) {
                    document.getElementById('iconPreview').textContent = iconInput.value;
                }
            });

            function openIconPicker() {
                document.getElementById('iconPickerOverlay').style.display = 'flex';
                renderIcons(iconList);
            }

            function closeIconPicker() {
                document.getElementById('iconPickerOverlay').style.display = 'none';
            }

            function renderIcons(icons) {
                const grid = document.getElementById('iconGrid');
                grid.innerHTML = '';
                
                icons.forEach(icon => {
                    const btn = document.createElement('button');
                    btn.type = 'button'; // RбЇ•t quan trбїНng ƒСбїГ kh√іng submit form
                    btn.innerHTML = icon;
                    btn.style.cssText = `font-size: 32px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; background: transparent; cursor: pointer; transition: all 0.2s;`;
                    btn.onmouseover = () => btn.style.background = '#f3f4f6';
                    btn.onmouseout = () => btn.style.background = 'transparent';
                    btn.onclick = () => selectIcon(icon);
                    grid.appendChild(btn);
                });
            }

            function selectIcon(icon) {
                // ƒРiбїБn icon ƒС∆∞бї£c chбїНn v√†o khung nhбЇ≠p бЇ©n cбїІa Django
                document.getElementById('id_icon').value = icon;
                // CбЇ≠p nhбЇ≠t lбЇ°i khung hiбїГn thбїЛ
                document.getElementById('iconPreview').textContent = icon;
                closeIconPicker();
            }

            // T√≠nh nƒГng t√ђm kiбЇњm
            document.getElementById('iconSearch').addEventListener('input', (e) => {
                const search = e.target.value.toLowerCase();
                const filtered = iconList.filter(icon => icon.includes(search) || search === '');
                renderIcons(filtered.length > 0 ? filtered : iconList);
            });

            // BбЇ•m ra ngo√†i v√єng tбїСi sбЇљ ƒС√≥ng popup
            document.getElementById('iconPickerOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeIconPicker();
            });
        </script>
    </body>
</html>
