{% load static %}
<!DOCTYPE html>
<html lang="vi" data-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>{% block title %} Quản lý Chi tiêu {% endblock %}</title>

        <link rel="icon" type="image/png" href="/media/avatars/logo.png?v=1">
        <script>
            // Load theme immediately to prevent flash
            (function() {
                const savedTheme = localStorage.getItem('theme') || 'dark';
                document.documentElement.setAttribute('data-theme', savedTheme);
            })();
        </script>

        {% block cssblock %}
            <link rel="stylesheet" href="{% static 'homepage/css/style.css' %}">
        {% endblock %}
    </head>

    <body>
        <!-- Mobile Menu Toggle -->
        <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Toggle menu">
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <div class="dashboard">
            {% include "sidebar.html" %}

            <!-- Main Content -->
            <main class="main-content">
                {% block content %}
                {% endblock %}

                {% include "footer.html" %}
            </main>

            <!-- Floating Action Button (FAB) -->
            <a href="{% url 'finances:transaction' %}" class="fab-btn" aria-label="Thêm Giao Dịch">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </a>
        </div>
        
        {% block jsblock %}
        {% endblock %}
    </body>
</html>
