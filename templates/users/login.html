{% extends "users/base_auth.html" %}

{% block content %}
    <!-- Flash Messages (Errors/Success) -->
    {% if messages %}
        <div class="form-messages {% for message in messages %}{% if message.tags == 'success' %}success{% endif %}{% endfor %}">
            {% for message in messages %}
                <div style="margin-bottom: 4px;">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    <!-- Tab Switcher -->
    <div class="auth-tabs">
        <button class="auth-tab active" data-form="login">Đăng Nhập</button>
        <button class="auth-tab" data-form="register">Đăng Ký</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form active" id="loginForm" method="post" action="{% url 'users:login' %}">
        {% csrf_token %}
        <input type="hidden" name="form_type" value="login">
        
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" name="username" placeholder="Nhập tên đăng nhập" required>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" placeholder="Nhập mật khẩu" required>
        </div>

        <button type="submit" class="btn-submit">Đăng Nhập</button>

        <div style="text-align: center; font-size: 14px; color: var(--text-muted); margin-top: 10px;">
            Chưa có tài khoản? <a href="#" id="switchToRegister" style="color: var(--accent-copper); text-decoration: none; font-weight: 600;">Đăng ký miễn phí</a>
        </div>
    </form>

    <!-- Register Form -->
    <form class="auth-form" id="registerForm" method="post" action="{% url 'users:login' %}">
        {% csrf_token %}
        <input type="hidden" name="form_type" value="register">
        
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" name="username" placeholder="Tạo tên đăng nhập" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Nhập email của bạn" required>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password1" placeholder="Tạo mật khẩu" required>
        </div>

        <div class="form-group">
            <label>Nhập lại mật khẩu</label>
            <input type="password" name="password2" placeholder="Xác nhận mật khẩu" required>
        </div>

        <button type="submit" class="btn-submit">Đăng Ký</button>

        <div style="text-align: center; font-size: 14px; color: var(--text-muted); margin-top: 10px;">
            Đã có tài khoản? <a href="#" id="switchToLogin" style="color: var(--accent-copper); text-decoration: none; font-weight: 600;">Đăng nhập ngay</a>
        </div>
    </form>
{% endblock %}
