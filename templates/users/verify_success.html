{% extends "users/base_auth.html" %}
{% block title %}Xác thực thành công - Quản lý Chi tiêu{% endblock %}

{% block content %}
    <div style="text-align: center; padding: 20px 0;">
        <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
        <h2 style="font-size: 20px; font-weight: 600; margin-bottom: 12px; color: #22c55e;">Xác thực thành công</h2>
        <p style="color: var(--text-muted); font-size: 15px; margin-bottom: 30px; line-height: 1.5;">{{ message }}</p>
        
        <a href="{% url 'users:login' %}" class="btn-submit" style="display: inline-block; text-decoration: none; width: 100%; box-sizing: border-box;">Đăng nhập ngay</a>
    </div>
{% endblock %}
